services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "127.0.0.1:5435:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=taxhacker
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taxhacker"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging:
      driver: "local"
      options:
        max-size: "100M"
        max-file: "3"
