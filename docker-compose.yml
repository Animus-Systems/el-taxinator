services:
  app:
    build: .
    ports:
      - "7331:7331"
    environment:
      - NODE_ENV=production
      - SELF_HOSTED_MODE=true
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: taxinator
      POSTGRES_PASSWORD: taxinator
      POSTGRES_DB: taxinator
    volumes:
      - ./data/default/pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxinator -d taxinator"]
      interval: 5s
      timeout: 5s
      retries: 20
